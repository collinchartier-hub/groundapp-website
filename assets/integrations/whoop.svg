<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- WHOOP: Strap shape with sensor module -->
  <!-- Strap band -->
  <rect x="16" y="24" width="48" height="32" rx="16" ry="16" fill="none" stroke="#C4935A" stroke-width="2"/>
  <!-- Sensor module (raised center rectangle) -->
  <rect x="28" y="28" width="24" height="24" rx="4" ry="4" fill="none" stroke="#C4935A" stroke-width="1.5"/>
  <!-- Strain indicator bar -->
  <line x1="33" y1="36" x2="47" y2="36" stroke="#C4935A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="40" x2="44" y2="40" stroke="#C4935A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="44" x2="40" y2="44" stroke="#C4935A" stroke-width="1.5" stroke-linecap="round"/>
</svg>
