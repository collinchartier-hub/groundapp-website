<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Apple Watch: Rounded rectangle watch face with crown and time indicator -->
  <!-- Watch body -->
  <rect x="22" y="14" width="36" height="52" rx="10" ry="10" fill="none" stroke="#C4935A" stroke-width="2"/>
  <!-- Digital crown (side button) -->
  <rect x="58" y="30" width="4" height="10" rx="2" ry="2" fill="#C4935A"/>
  <!-- Screen area -->
  <rect x="27" y="20" width="26" height="40" rx="6" ry="6" fill="none" stroke="#C4935A" stroke-width="1" opacity="0.5"/>
  <!-- Activity rings (simplified) -->
  <circle cx="40" cy="40" r="10" fill="none" stroke="#C4935A" stroke-width="1.5" stroke-dasharray="50 14" stroke-linecap="round"/>
  <circle cx="40" cy="40" r="6" fill="none" stroke="#C4935A" stroke-width="1.5" stroke-dasharray="30 10" stroke-linecap="round" opacity="0.7"/>
</svg>
