<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="warrior-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.545
                0 0 0 0 0.369
                0 0 0 0 0.235
                0 0 0 0.4 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="warrior-shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#8B5E3C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C4935A" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="warrior-flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B5E3C" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C4935A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C4935A" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <g filter="url(#warrior-glow)">
    <!-- Shield outline -->
    <path d="M60 14 L88 28 L88 58 Q88 82 60 102 Q32 82 32 58 L32 28 Z"
          stroke="#8B5E3C" stroke-width="2" stroke-linejoin="round" fill="url(#warrior-shield-fill)"/>
    <!-- Inner shield border -->
    <path d="M60 22 L82 33 L82 57 Q82 77 60 94 Q38 77 38 57 L38 33 Z"
          stroke="#8B5E3C" stroke-width="1" stroke-linejoin="round" opacity="0.4" fill="none"/>
    <!-- Central flame -->
    <path d="M60 82 Q52 70 54 60 Q56 52 52 44 Q58 50 60 42 Q62 50 68 44 Q64 52 66 60 Q68 70 60 82 Z"
          stroke="#C4935A" stroke-width="1.8" stroke-linejoin="round" fill="url(#warrior-flame)"/>
    <!-- Inner flame detail -->
    <path d="M60 78 Q56 70 58 62 Q60 56 58 50 Q60 54 62 50 Q60 56 62 62 Q64 70 60 78 Z"
          stroke="#C4935A" stroke-width="1" opacity="0.6" fill="#C4935A" fill-opacity="0.15"/>
    <!-- Flame core -->
    <path d="M60 74 Q58 68 59 63 Q60 60 59 56 Q60 58 61 56 Q60 60 61 63 Q62 68 60 74 Z"
          fill="#C4935A" opacity="0.4"/>
    <!-- Shield cross/structure lines -->
    <line x1="60" y1="22" x2="60" y2="38" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="42" y1="38" x2="78" y2="38" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Corner ornaments on shield -->
    <path d="M44 30 L48 34 L44 34" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <path d="M76 30 L72 34 L76 34" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <!-- Gold accent dots at shield points -->
    <circle cx="60" cy="14" r="2.5" fill="#C4935A" opacity="0.8"/>
    <circle cx="88" cy="28" r="2" fill="#C4935A" opacity="0.6"/>
    <circle cx="32" cy="28" r="2" fill="#C4935A" opacity="0.6"/>
    <!-- Spark particles from flame -->
    <circle cx="52" cy="38" r="1.2" fill="#C4935A" opacity="0.5"/>
    <circle cx="68" cy="36" r="1" fill="#C4935A" opacity="0.45"/>
    <circle cx="56" cy="32" r="0.8" fill="#C4935A" opacity="0.35"/>
    <circle cx="65" cy="30" r="0.9" fill="#C4935A" opacity="0.3"/>
    <!-- Bottom shield point gold accent -->
    <circle cx="60" cy="100" r="2" fill="#C4935A" opacity="0.7"/>
  </g>
</svg>