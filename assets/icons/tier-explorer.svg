<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="explorer-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.831
                0 0 0 0 0.647
                0 0 0 0 0.455
                0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="explorer-mountain-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <g filter="url(#explorer-glow)">
    <!-- Compass circle (outer) -->
    <circle cx="60" cy="58" r="38" stroke="#D4A574" stroke-width="1.5" opacity="0.35"/>
    <!-- Compass tick marks -->
    <line x1="60" y1="19" x2="60" y2="24" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="60" y1="92" x2="60" y2="97" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="21" y1="58" x2="26" y2="58" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="94" y1="58" x2="99" y2="58" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Diagonal ticks -->
    <line x1="33.1" y1="31.1" x2="36.6" y2="34.6" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <line x1="83.4" y1="34.6" x2="86.9" y2="31.1" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <line x1="33.1" y1="84.9" x2="36.6" y2="81.4" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <line x1="83.4" y1="81.4" x2="86.9" y2="84.9" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <!-- Mountain range behind compass -->
    <path d="M28 78 L44 48 L52 60 L60 38 L68 55 L76 45 L92 78" stroke="#D4A574" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="url(#explorer-mountain-fill)"/>
    <!-- Snow caps -->
    <path d="M57 42 L60 38 L63 42" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.7" fill="#D4A574" fill-opacity="0.15"/>
    <path d="M74 48 L76 45 L78 48" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.5" fill="#D4A574" fill-opacity="0.1"/>
    <!-- Winding path from bottom to mountain -->
    <path d="M60 92 Q55 85 58 78 Q65 72 60 65" stroke="#C4935A" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2" opacity="0.7"/>
    <!-- North star / gold accent at peak -->
    <circle cx="60" cy="33" r="3" fill="#C4935A" opacity="0.8"/>
    <path d="M60 28 L60 38 M55 33 L65 33" stroke="#C4935A" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <!-- Small gold accent stars -->
    <circle cx="42" cy="44" r="1.2" fill="#C4935A" opacity="0.5"/>
    <circle cx="80" cy="50" r="1" fill="#C4935A" opacity="0.4"/>
    <!-- Ground line -->
    <path d="M25 80 Q45 76 60 80 Q75 84 95 80" stroke="#D4A574" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>