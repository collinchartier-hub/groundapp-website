<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="seedling-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.478
                0 0 0 0 0.545
                0 0 0 0 0.435
                0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#seedling-glow)">
    <!-- Soil line -->
    <path d="M30 85 Q45 82 60 85 Q75 88 90 85" stroke="#7A8B6F" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Soil texture dots -->
    <circle cx="40" cy="88" r="1.2" fill="#7A8B6F" opacity="0.3"/>
    <circle cx="55" cy="90" r="1" fill="#7A8B6F" opacity="0.25"/>
    <circle cx="70" cy="89" r="1.3" fill="#7A8B6F" opacity="0.3"/>
    <circle cx="80" cy="87" r="1" fill="#7A8B6F" opacity="0.2"/>
    <!-- Root hints below soil -->
    <path d="M60 85 L58 92" stroke="#7A8B6F" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <path d="M60 85 L63 91" stroke="#7A8B6F" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
    <!-- Main stem -->
    <path d="M60 85 Q59 70 60 55" stroke="#7A8B6F" stroke-width="2" stroke-linecap="round"/>
    <!-- Left leaf - small, just unfurling -->
    <path d="M60 65 Q48 58 44 50" stroke="#7A8B6F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M60 65 Q50 62 44 50" stroke="none" fill="#7A8B6F" opacity="0.15"/>
    <!-- Right leaf - slightly larger -->
    <path d="M60 58 Q72 50 78 42" stroke="#7A8B6F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M60 58 Q70 54 78 42" stroke="none" fill="#7A8B6F" opacity="0.15"/>
    <!-- Leaf vein details -->
    <path d="M60 65 L50 56" stroke="#7A8B6F" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M60 58 L70 48" stroke="#7A8B6F" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <!-- Tiny emerging tip at top -->
    <path d="M60 55 Q58 48 56 42" stroke="#7A8B6F" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M60 55 Q62 48 64 43" stroke="#7A8B6F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Gold accent - dewdrop on leaf tip -->
    <circle cx="78" cy="41" r="2.5" fill="#C4935A" opacity="0.7"/>
    <circle cx="78" cy="40.5" r="1" fill="#C4935A" opacity="0.9"/>
    <!-- Second small gold accent -->
    <circle cx="44" cy="49" r="1.8" fill="#C4935A" opacity="0.5"/>
  </g>
</svg>